name: build dictionaries

on:
  push:
    tags:
      - '*'
  schedule:
    - cron: '42 2 15 * *'
  workflow_run:
    workflows: [test]
    types:
      - completed
    branches:
      - master

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        edition: ['en', 'es', 'fr', 'ru']
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6

      - name: Get date
        id: get-date
        run: echo "date=$(/bin/date -u "+%Y%m%d")" >> "$GITHUB_OUTPUT"

      - name: Get tag
        id: get-tag
        run: echo "tag=${{ (github.event_name == 'push' && github.ref_name) || steps.get-date.outputs.date }}" >> "$GITHUB_OUTPUT"

      - if: matrix.edition == 'en' && github.event_name != 'workflow_run'
        run: gh release create ${{ steps.get-tag.outputs.tag }} -d

      - run: python -m pip install .
      - run: dict build ${{ matrix.edition }}

      - if: github.event_name != 'workflow_run'
        run: gh release upload ${{ steps.get-tag.outputs.tag }} build/*.tar.zst

  release:
    needs: build
    if: needs.build.result == 'success' && github.event_name != 'workflow_run'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - run: gh release edit ${{ needs.build.outputs.tag }} --draft=false --latest
      - run: |
          python -m pip install .
          dict page ${{ needs.build.outputs.tag }}
      - uses: actions/upload-pages-artifact@v4

  deploy:
    if: needs.release.result == 'success' && github.event_name != 'workflow_run'
    needs: release
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
