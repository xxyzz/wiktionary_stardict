name: build dictionaries

on:
  push:
    tags:
      - '*'
  schedule:
    - cron: '42 2 15 * *'
  workflow_run:
    workflows: [test]
    types:
      - completed
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        edition: ['en', 'es']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Get date
        id: get-date
        run: echo "date=$(/bin/date -u "+%Y%m%d")" >> "$GITHUB_OUTPUT"

      - name: Get tag
        id: get-tag
        run: echo "tag=${{ (github.event_name == 'push' && github.ref_name) || steps.get-date.outputs.date }}" >> "$GITHUB_OUTPUT"

      - if: matrix.edition == 'en' && github.event_name != 'workflow_run'
        run: gh release create ${{ steps.get-tag.outputs.tag }} -d
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: python -m pip install .
      - run: dict ${{ matrix.edition }}

      - if: github.event_name != 'workflow_run'
        run: gh release upload ${{ steps.get-tag.outputs.tag }} build/*.tar.zst
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - if: matrix.edition == 'en' && github.event_name != 'workflow_run'
        run: gh release edit ${{ steps.get-tag.outputs.tag }} --draft=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
