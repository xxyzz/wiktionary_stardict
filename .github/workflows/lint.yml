name: Lint

on:
  push:
    branches:
      - '*'
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - run: python -m pip install .[dev]
      - run: python -m ruff check .
      - run: python -m ruff format --diff .
